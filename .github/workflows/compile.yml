name: Nightly Compiler

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  discussions: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install compiler dependencies
        run: pip install -r compiler/requirements.txt

      - name: Compile registry database
        run: python compiler/compile.py --out registry.db
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AGORA_REGISTRY_REPO: ${{ github.repository }}

      - name: Upload registry artifacts
        uses: actions/upload-artifact@v4
        with:
          name: registry-artifacts
          path: |
            registry.db
            registry.db.sig
          if-no-files-found: error

      - name: Verify Code of Engagement in all required locations
        run: |
          grep -q "Code of Engagement" README.md || (echo "Missing in README.md" && exit 1)
          grep -q "Code of Engagement" .github/ISSUE_TEMPLATE/review-form.yml || (echo "Missing in review-form.yml" && exit 1)
          grep -q "Code of Engagement" CODE_OF_ENGAGEMENT.md || (echo "Missing in CODE_OF_ENGAGEMENT.md" && exit 1)

      # Upload to GitHub Release Assets as a tagged release (registry-YYYY-MM-DD).
      - name: Deploy to GitHub Release
        run: python scripts/deploy_release_assets.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGORA_REGISTRY_REPO: ${{ github.repository }}
