name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      # Linux: Tauri needs webkit2gtk and other system deps
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: |
          cd desktop
          npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGORA_OAUTH_CLIENT_ID: ${{ secrets.AGORA_OAUTH_CLIENT_ID }}
          AGORA_REGISTRY_REPO: ${{ github.repository }}
          AGORA_REGISTRY_PUBKEY: ${{ secrets.AGORA_REGISTRY_PUBKEY }}
          # Updater signing key — required for signed auto-update checks.
          # Generate once locally with: npx @tauri-apps/cli signer generate -w ~/.tauri/agora.key
          # Copy the PEM output to GitHub Secrets > TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Agora ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer for your platform below. Windows: .msi or .exe. macOS: .dmg. Linux: .AppImage or .deb."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # After all platforms build, publish the release
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # The tauri-action creates a draft release; publish it.
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY" || \
            echo "Release may already be published or still in draft."
